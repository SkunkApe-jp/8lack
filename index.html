<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MonoWall — Generative Wallpaper Studio</title>
    <meta name="description" content="Generate minimalist, monochromatic wallpapers with precision color control." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-void:      #05050a;
            --bg-panel:     #0d0d14;
            --bg-surface:   #131320;
            --bg-raised:    #1a1a2a;
            --border:       rgba(255,255,255,0.07);
            --border-hover: rgba(255,255,255,0.18);
            --text-primary: #f0ede8;
            --text-muted:   #6b6880;
            --text-dim:     #3a3850;
            --accent:       #c9b99a;
            --accent-glow:  rgba(201,185,154,0.15);
            --r-color:      #e06b6b;
            --g-color:      #6bba7a;
            --b-color:      #6b9de0;
            --panel-w:      340px;
            --serif:        'Cormorant Garamond', Georgia, serif;
            --mono:         'JetBrains Mono', monospace;
            --radius:       6px;
            --transition:   0.2s cubic-bezier(0.4,0,0.2,1);
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            background: var(--bg-void);
            color: var(--text-primary);
            font-family: var(--mono);
            font-size: 13px;
            -webkit-font-smoothing: antialiased;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 99px; }

        /* Layout */
        .app { display: flex; height: 100vh; }

        /* ── CONTROL PANEL ── */
        .panel {
            width: var(--panel-w);
            flex-shrink: 0;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .panel-header {
            padding: 28px 28px 24px;
            border-bottom: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .panel-header::before {
            content: '';
            position: absolute;
            top: -40px; left: -40px;
            width: 140px; height: 140px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            pointer-events: none;
        }
        .brand {
            font-family: var(--serif);
            font-weight: 600;
            font-size: 22px;
            letter-spacing: 0.08em;
            color: var(--text-primary);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-mark {
            width: 10px; height: 10px;
            background: var(--accent);
            transform: rotate(45deg);
            flex-shrink: 0;
        }
        .brand-sub {
            font-family: var(--serif);
            font-style: italic;
            font-weight: 300;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 5px;
            letter-spacing: 0.04em;
        }

        /* Scrollable body */
        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* Section */
        .section-label {
            font-family: var(--serif);
            font-style: italic;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Color picker row */
        .color-picker-wrap {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: border-color var(--transition);
        }
        .color-picker-wrap:hover { border-color: var(--border-hover); }
        .color-picker-wrap input[type="color"] {
            display: block;
            width: 100%;
            height: 52px;
            border: none;
            cursor: pointer;
            background: none;
            padding: 0;
        }
        /* hex label overlay */
        .color-hex-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 12px;
            pointer-events: none;
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.55);
            mix-blend-mode: difference;
        }

        /* RGB readout */
        .rgb-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
        .rgb-chip {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 8px;
            text-align: center;
            transition: border-color var(--transition), background var(--transition);
        }
        .rgb-chip:hover { background: var(--bg-raised); border-color: var(--border-hover); }
        .rgb-chip-label {
            font-family: var(--serif);
            font-style: italic;
            font-size: 10px;
            letter-spacing: 0.12em;
            margin-bottom: 4px;
            display: block;
        }
        .rgb-chip-label.r { color: var(--r-color); }
        .rgb-chip-label.g { color: var(--g-color); }
        .rgb-chip-label.b { color: var(--b-color); }
        .rgb-chip-val {
            font-family: var(--mono);
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
        }

        /* Form controls */
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label {
            font-family: var(--serif);
            font-style: italic;
            font-size: 11px;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }
        .input-text {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 9px 12px;
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text-primary);
            width: 100%;
            outline: none;
            transition: border-color var(--transition), background var(--transition);
        }
        .input-text:hover { border-color: var(--border-hover); }
        .input-text:focus { border-color: var(--accent); background: var(--bg-raised); }
        select.input-text { cursor: pointer; }
        select.input-text option { background: var(--bg-panel); color: var(--text-primary); }

        /* Accent color row */
        .accent-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }
        .accent-swatch-wrap {
            flex-shrink: 0;
            width: 48px;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: border-color var(--transition);
        }
        .accent-swatch-wrap:hover { border-color: var(--border-hover); }
        .accent-swatch-wrap input[type="color"] {
            display: block;
            width: 100%;
            height: 100%;
            min-height: 38px;
            border: none;
            cursor: pointer;
            padding: 0;
            background: none;
        }
        .auto-btn {
            font-family: var(--serif);
            font-style: italic;
            font-size: 11px;
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            letter-spacing: 0.06em;
            white-space: nowrap;
            opacity: 0.85;
            transition: opacity var(--transition);
            padding: 2px 0;
        }
        .auto-btn:hover { opacity: 1; }
        .accent-field-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .accent-meta { display: flex; justify-content: space-between; align-items: center; }

        /* Range slider */
        .range-wrap { display: flex; flex-direction: column; gap: 6px; }
        .range-header { display: flex; justify-content: space-between; align-items: baseline; }
        .range-header label {
            font-family: var(--serif);
            font-style: italic;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.1em;
        }
        .range-val {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 0.06em;
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: var(--bg-raised);
            border-radius: 99px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid var(--bg-panel);
            box-shadow: 0 0 0 1px var(--accent);
            transition: transform var(--transition);
        }
        input[type="range"]:hover::-webkit-slider-thumb { transform: scale(1.2); }

        /* Checkboxes */
        .toggle-row { display: flex; gap: 20px; }
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }
        .toggle-label span {
            font-family: var(--serif);
            font-style: italic;
            font-size: 13px;
            color: var(--text-muted);
            transition: color var(--transition);
        }
        .toggle-label:hover span { color: var(--text-primary); }
        input[type="checkbox"] {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg-surface);
            cursor: pointer;
            position: relative;
            transition: border-color var(--transition), background var(--transition);
            flex-shrink: 0;
        }
        input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
        }
        input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 2px; left: 5px;
            width: 4px; height: 7px;
            border: 2px solid var(--bg-panel);
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }

        /* Dimensions grid */
        .dims-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .dim-field { display: flex; flex-direction: column; gap: 5px; }
        .dim-label {
            font-family: var(--serif);
            font-style: italic;
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        /* Panel footer */
        .panel-footer {
            padding: 20px 28px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            width: 100%;
            padding: 13px;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            font-family: var(--serif);
            font-size: 14px;
            letter-spacing: 0.14em;
            font-style: italic;
            font-weight: 600;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
        }
        .btn-secondary {
            background: var(--bg-surface);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--bg-raised);
            color: var(--text-primary);
            border-color: var(--border-hover);
        }
        .btn-primary {
            background: var(--accent);
            color: var(--bg-void);
            border: 1px solid transparent;
        }
        .btn-primary:hover {
            background: #d9cbb0;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .btn-primary:active { transform: scale(0.98); }

        /* ── CANVAS AREA ── */
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background:
                radial-gradient(ellipse 60% 60% at 30% 40%, rgba(201,185,154,0.03) 0%, transparent 70%),
                var(--bg-void);
        }
        .canvas-frame {
            position: relative;
            box-shadow:
                0 0 0 1px var(--border),
                0 30px 80px rgba(0,0,0,0.7),
                0 10px 30px rgba(0,0,0,0.5);
            border-radius: 2px;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 72vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Control Panel -->
        <aside class="panel">
            <div class="panel-header">
                <div class="brand">
                    <div class="brand-mark"></div>
                    Monowall
                </div>
                <p class="brand-sub">Generative Minimalist Wallpaper</p>
            </div>

            <div class="panel-body">

                <!-- Base Color -->
                <section>
                    <div class="section-label">Base Color</div>

                    <div class="color-picker-wrap">
                        <input type="color" id="backgroundColor" value="#000000" title="Pick base color">
                        <div class="color-hex-overlay" id="hexOverlay">#000000</div>
                    </div>

                    <div class="rgb-row">
                        <div class="rgb-chip">
                            <span class="rgb-chip-label r">Red</span>
                            <span class="rgb-chip-val" id="rgbR">0</span>
                        </div>
                        <div class="rgb-chip">
                            <span class="rgb-chip-label g">Green</span>
                            <span class="rgb-chip-val" id="rgbG">0</span>
                        </div>
                        <div class="rgb-chip">
                            <span class="rgb-chip-label b">Blue</span>
                            <span class="rgb-chip-val" id="rgbB">0</span>
                        </div>
                    </div>
                </section>

                <!-- Content -->
                <section>
                    <div class="section-label">Content</div>

                    <div class="field" style="margin-bottom:14px">
                        <label>Label Text</label>
                        <input type="text" id="colorName" value="Black" class="input-text" placeholder="Color name…">
                    </div>

                    <div class="field" style="margin-bottom:14px">
                        <div class="accent-meta">
                            <label>Accent Color</label>
                            <button id="autoAccentBtn" class="auto-btn">Auto Contrast</button>
                        </div>
                        <div class="accent-row">
                            <div class="accent-swatch-wrap">
                                <input type="color" id="accentColor" value="#FFFFFF" title="Pick accent color">
                            </div>
                            <input type="text" id="accentColorHex" value="#FFFFFF" class="input-text" style="font-size:12px;" placeholder="#FFFFFF">
                        </div>
                    </div>

                    <div class="range-wrap" style="margin-bottom:18px">
                        <div class="range-header">
                            <label>Box Scale</label>
                            <span class="range-val" id="boxScaleVal">20%</span>
                        </div>
                        <input type="range" id="boxSize" min="10" max="80" value="20">
                    </div>

                    <div class="toggle-row">
                        <label class="toggle-label">
                            <input type="checkbox" id="showHex" checked>
                            <span>Show HEX</span>
                        </label>
                        <label class="toggle-label">
                            <input type="checkbox" id="showRgb" checked>
                            <span>Show RGB</span>
                        </label>
                    </div>
                </section>

                <!-- Dimensions -->
                <section>
                    <div class="section-label">Dimensions</div>

                    <div class="field" style="margin-bottom:12px">
                        <select id="resolutionPreset" class="input-text"></select>
                    </div>

                    <div class="dims-grid">
                        <div class="dim-field">
                            <span class="dim-label">Width</span>
                            <input type="number" id="widthInput" value="1920" class="input-text">
                        </div>
                        <div class="dim-field">
                            <span class="dim-label">Height</span>
                            <input type="number" id="heightInput" value="1080" class="input-text">
                        </div>
                    </div>
                </section>

            </div><!-- /.panel-body -->

            <div class="panel-footer">
                <button id="randomizeBtn" class="btn btn-secondary">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line></svg>
                    Randomise
                </button>
                <button id="downloadBtn" class="btn btn-primary">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Download PNG
                </button>
            </div>
        </aside>

        <!-- Canvas Area -->
        <main class="canvas-area">
            <div class="canvas-frame">
                <canvas id="wallpaperCanvas" style="background:#111;"></canvas>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
