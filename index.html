<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MonoWall Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { mono: ['"JetBrains Mono"', 'monospace'] },
                    colors: { gray: { 850: '#1f2937', 900: '#111827', 950: '#030712' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        .app-container { display: flex; height: 100vh; }
        .control-panel { width: 24rem; background-color: #111827; border-right: 1px solid #1f2937; display: flex; flex-direction: column; }
        .canvas-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        input[type="range"] { accent-color: white; }
        input[type="checkbox"] { accent-color: white; }
    </style>
</head>
<body class="bg-gray-950">
    <div class="app-container">
        <!-- Control Panel -->
        <div class="control-panel h-full flex flex-col w-full md:w-80 lg:w-96 overflow-y-auto">
            <div class="p-6 border-b border-gray-800">
                <h1 class="text-xl font-bold text-white tracking-tighter flex items-center gap-2">
                    <div class="w-4 h-4 bg-white border border-gray-500"></div>MONOWALL
                </h1>
                <p class="text-xs text-gray-500 mt-1">Generative Minimalist Wallpaper</p>
            </div>

            <div class="p-6 space-y-8 flex-1">
                <!-- Color Section -->
                <section class="space-y-4">
                    <h2 class="text-xs uppercase tracking-widest text-gray-400 font-bold">Base Color</h2>
                    <div class="flex items-center gap-4">
                        <div class="relative w-full">
                            <input type="color" id="backgroundColor" value="#000000" class="w-full h-12 bg-transparent border border-gray-700 rounded cursor-pointer">
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-xs font-mono">
                        <div class="bg-gray-800 p-2 rounded text-center border border-gray-700"><span class="block text-gray-500 mb-1">R</span><span id="rgbR">0</span></div>
                        <div class="bg-gray-800 p-2 rounded text-center border border-gray-700"><span class="block text-gray-500 mb-1">G</span><span id="rgbG">0</span></div>
                        <div class="bg-gray-800 p-2 rounded text-center border border-gray-700"><span class="block text-gray-500 mb-1">B</span><span id="rgbB">0</span></div>
                    </div>
                </section>

                <!-- Content Section -->
                <section class="space-y-4">
                    <h2 class="text-xs uppercase tracking-widest text-gray-400 font-bold">Content</h2>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1.5">Label Text</label>
                        <input type="text" id="colorName" value="Black" class="w-full bg-gray-950 border border-gray-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-white transition-colors font-mono">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1.5">
                            <label class="block text-xs text-gray-500">Accent Color</label>
                            <button id="autoAccentBtn" class="text-[10px] text-blue-400 hover:text-blue-300 underline">Auto Contrast</button>
                        </div>
                        <div class="flex gap-2">
                            <input type="color" id="accentColor" value="#FFFFFF" class="h-8 w-12 bg-transparent border border-gray-700 rounded p-0 cursor-pointer">
                            <input type="text" id="accentColorHex" value="#FFFFFF" class="flex-1 bg-gray-950 border border-gray-700 rounded px-2 text-xs font-mono">
                        </div>
                    </div>
                    <div>
                        <label id="boxScaleLabel" class="block text-xs text-gray-500 mb-1.5">Box Scale (20%)</label>
                        <input type="range" id="boxSize" min="10" max="80" value="20" class="w-full">
                    </div>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="showHex" checked class="accent-white"><span class="text-sm text-gray-300">Show HEX</span></label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="showRgb" checked class="accent-white"><span class="text-sm text-gray-300">Show RGB</span></label>
                    </div>
                </section>

                <!-- Resolution Section -->
                <section class="space-y-4">
                    <h2 class="text-xs uppercase tracking-widest text-gray-400 font-bold">Dimensions</h2>
                    <select id="resolutionPreset" class="w-full bg-gray-950 border border-gray-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-white transition-colors">
                        <!-- Options will be populated by JS -->
                    </select>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] text-gray-600 mb-1">WIDTH</label>
                            <input type="number" id="widthInput" value="1920" class="w-full bg-gray-950 border border-gray-700 rounded px-2 py-1.5 text-sm text-white font-mono">
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-600 mb-1">HEIGHT</label>
                            <input type="number" id="heightInput" value="1080" class="w-full bg-gray-950 border border-gray-700 rounded px-2 py-1.5 text-sm text-white font-mono">
                        </div>
                    </div>
                </section>
            </div>

            <div class="p-6 border-t border-gray-800 space-y-3">
                <button id="randomizeBtn" class="w-full bg-gray-800 hover:bg-gray-700 text-white py-3 rounded flex items-center justify-center gap-2 transition-colors font-medium text-sm">Randomize Style</button>
                <button id="downloadBtn" class="w-full bg-white hover:bg-gray-200 text-black py-3 rounded flex items-center justify-center gap-2 transition-colors font-bold text-sm">DOWNLOAD PNG</button>
            </div>
        </div>

        <!-- Canvas Area -->
        <div class="canvas-area">
            <div class="relative shadow-2xl">
                <canvas id="wallpaperCanvas" class="w-full h-auto block" style="max-height: 70vh; object-fit: contain; background-color: #111;"></canvas>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
